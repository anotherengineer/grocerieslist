<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Groceries List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 24px 16px;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      color: #1a202c;
      margin-bottom: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2d3748;
    }

    .badge {
      background: #edf2f7;
      color: #718096;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .add-row {
      display: flex;
      gap: 8px;
    }

    .add-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      color: #2d3748;
    }

    .add-row input:focus { border-color: #667eea; }

    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-add {
      background: #667eea;
      color: #fff;
      white-space: nowrap;
    }

    .btn-add:hover { opacity: 0.88; }

    .btn-clear {
      background: #fff;
      color: #e53e3e;
      border: 1.5px solid #feb2b2;
      font-size: 0.8rem;
      padding: 6px 12px;
      align-self: flex-start;
    }

    .btn-clear:hover { background: #fff5f5; }

    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 40px;
    }

    .item-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f7fafc;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.9rem;
      color: #2d3748;
      animation: fadeIn 0.18s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-name { flex: 1; }

    .btn-delete {
      background: none;
      border: none;
      color: #a0aec0;
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 0 0 0 8px;
      transition: color 0.15s;
    }

    .btn-delete:hover { color: #e53e3e; }

    .empty-msg {
      color: #a0aec0;
      font-size: 0.85rem;
      text-align: center;
      padding: 10px 0;
    }

    /* per-store accent colors on left border */
    .card[data-store="indian"]      { border-left: 4px solid #f6ad55; }
    .card[data-store="costco"]      { border-left: 4px solid #63b3ed; }
    .card[data-store="wholefoods"]  { border-left: 4px solid #68d391; }
    .card[data-store="farmersmarket"]{ border-left: 4px solid #fc8181; }
  </style>
</head>
<body>

<h1>Groceries List</h1>
<p id="sync-status" style="text-align:center;font-size:0.78rem;color:#a0aec0;margin-top:-18px;margin-bottom:20px;">auto-syncs every 30s</p>

<div class="grid" id="grid"></div>

<script>
  const STORES = [
    { key: "indian",       label: "Indian Store" },
    { key: "costco",       label: "Costco" },
    { key: "wholefoods",   label: "Whole Foods" },
    { key: "farmersmarket",label: "Farmers Market" },
  ];

  // ── Build cards ──────────────────────────────────────────────
  const grid = document.getElementById("grid");

  STORES.forEach(({ key, label }) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.store = key;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-title">${label}</span>
        <span class="badge" id="badge-${key}">0</span>
      </div>
      <div class="add-row">
        <input id="input-${key}" type="text" placeholder="Add an item…" />
        <button class="btn btn-add" onclick="addItem('${key}')">Add</button>
      </div>
      <ul class="item-list" id="list-${key}"></ul>
      <button class="btn btn-clear" onclick="clearAll('${key}')">Clear All</button>
    `;
    grid.appendChild(card);

    // Allow Enter key to submit
    document.getElementById(`input-${key}`)
      .addEventListener("keydown", e => { if (e.key === "Enter") addItem(key); });
  });

  // ── API helpers ───────────────────────────────────────────────
  async function loadItems(store) {
    const res = await fetch(`/api/items/${store}`);
    const items = await res.json();
    renderList(store, items);
  }

  async function addItem(store) {
    const input = document.getElementById(`input-${store}`);
    const name = input.value.trim();
    if (!name) return;
    input.value = "";
    await fetch(`/api/items/${store}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });
    loadItems(store);
  }

  async function deleteItem(store, index) {
    await fetch(`/api/items/${store}/${index}`, { method: "DELETE" });
    loadItems(store);
  }

  async function clearAll(store) {
    if (!confirm(`Clear all items from ${store}?`)) return;
    await fetch(`/api/items/${store}/all`, { method: "DELETE" });
    loadItems(store);
  }

  // ── Render ────────────────────────────────────────────────────
  function renderList(store, items) {
    const ul = document.getElementById(`list-${store}`);
    const badge = document.getElementById(`badge-${store}`);
    badge.textContent = items.length;

    if (items.length === 0) {
      ul.innerHTML = `<p class="empty-msg">Nothing here yet</p>`;
      return;
    }

    ul.innerHTML = items.map(item => `
      <li>
        <span class="item-name">${escHtml(item.name)}</span>
        <button class="btn-delete" onclick="deleteItem('${store}', ${item.index})" title="Remove">&#x2715;</button>
      </li>
    `).join("");
  }

  function escHtml(str) {
    return str.replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  // ── Init + auto-refresh ───────────────────────────────────────
  function refreshAll() {
    STORES.forEach(({ key }) => loadItems(key));
    const status = document.getElementById("sync-status");
    status.textContent = "synced " + new Date().toLocaleTimeString();
  }

  refreshAll();
  setInterval(refreshAll, 30_000);
</script>
</body>
</html>
